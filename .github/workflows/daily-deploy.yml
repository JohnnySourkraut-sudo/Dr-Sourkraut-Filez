name: Daily UFO Blog Deployment

on:
  schedule:
    # Monday 08:00 GMT+2 (06:00 UTC)
    - cron: '0 6 * * 1'
    # Tuesday 08:00 GMT+2
    - cron: '0 6 * * 2'
    # Wednesday 08:00 GMT+2
    - cron: '0 6 * * 3'
    # Thursday 08:00 GMT+2
    - cron: '0 6 * * 4'
    # Friday 08:00 GMT+2
    - cron: '0 6 * * 5'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to GitHub Pages
        run: |
          echo "✅ Daily UFO Blog deployment at $(date)"
          echo "Landing page: https://johnnysourkraut-sudo.github.io/Dr-Sourkraut-Filez/"
