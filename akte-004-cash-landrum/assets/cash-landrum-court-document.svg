<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cash-Landrum court case document illustration</title>
  <desc id="desc">Stylized legal document showing the Cash-Landrum lawsuit timeline and dismissal date of August 21, 1986.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f0df"/>
      <stop offset="100%" stop-color="#e5d8bd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#1a1f1d"/>
  <g transform="translate(255 72) rotate(-2 545 430)" filter="url(#shadow)">
    <rect x="0" y="0" width="1090" height="856" rx="22" fill="url(#bg)" stroke="#8f7a5f" stroke-width="4"/>
    <rect x="54" y="54" width="982" height="748" rx="14" fill="none" stroke="#ab9876" stroke-width="2" stroke-dasharray="10 10"/>
    <text x="88" y="118" fill="#5d503f" font-size="28" font-family="Courier New, monospace" font-weight="700">UNITED STATES DISTRICT COURT</text>
    <text x="88" y="158" fill="#6d5a46" font-size="20" font-family="Courier New, monospace">SOUTHERN DISTRICT OF TEXAS</text>
    <text x="88" y="222" fill="#2a2a2a" font-size="38" font-family="Georgia, serif" font-weight="700">Cash et al. v. United States</text>
    <text x="88" y="266" fill="#4c4c4c" font-size="24" font-family="Georgia, serif">Claim: injury after December 29, 1980 aerial encounter near Dayton, Texas</text>

    <g fill="#514739" font-family="Courier New, monospace" font-size="24">
      <text x="88" y="344">WITNESSES:</text>
      <text x="290" y="344">Betty Cash, 51</text>
      <text x="290" y="382">Vickie Landrum, 57</text>
      <text x="290" y="420">Colby Landrum, 7</text>

      <text x="88" y="500">ALLEGATIONS:</text>
      <text x="290" y="500">severe heat exposure</text>
      <text x="290" y="538">nausea, vomiting, burns</text>
      <text x="290" y="576">hair loss, radiation-like symptoms</text>
      <text x="290" y="614">23 Chinook helicopters reported</text>
    </g>

    <rect x="742" y="314" width="238" height="238" rx="18" fill="#efe5d1" stroke="#826f57" stroke-width="3"/>
    <text x="861" y="372" text-anchor="middle" fill="#6f2e2e" font-size="32" font-family="Courier New, monospace" font-weight="800">DISMISSED</text>
    <text x="861" y="418" text-anchor="middle" fill="#6f2e2e" font-size="26" font-family="Courier New, monospace">21 AUG 1986</text>
    <text x="861" y="470" text-anchor="middle" fill="#7a6954" font-size="18" font-family="Courier New, monospace">government connection</text>
    <text x="861" y="496" text-anchor="middle" fill="#7a6954" font-size="18" font-family="Courier New, monospace">not proven in court</text>

    <line x1="88" y1="676" x2="1002" y2="676" stroke="#a99779" stroke-width="2"/>
    <text x="88" y="726" fill="#4b4032" font-size="23" font-family="Georgia, serif">Filed as one of the most controversial injury-linked UFO cases in American history.</text>
    <text x="88" y="778" fill="#6d5a46" font-size="18" font-family="Courier New, monospace">ARCHIVE RECONSTRUCTION // FOR EDITORIAL USE // NOT AN OFFICIAL FACSIMILE</text>
  </g>
</svg>