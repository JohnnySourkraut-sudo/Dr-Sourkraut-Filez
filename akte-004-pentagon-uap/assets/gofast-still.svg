<svg viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <!-- FLIR thermal background -->
  <defs>
    <radialGradient id="thermalGrad2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ff4400;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ff1100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000011;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="1024" height="768" fill="url(#thermalGrad2)"/>
  
  <!-- Targeting grid -->
  <g stroke="rgba(0,255,0,0.25)" stroke-width="1">
    <line x1="100" y1="384" x2="924" y2="384"/>
    <line x1="512" y1="100" x2="512" y2="668"/>
    <circle cx="512" cy="384" r="180" fill="none"/>
    <circle cx="512" cy="384" r="280" fill="none"/>
  </g>
  
  <!-- GoFast Object - fast moving -->
  <g>
    <rect x="420" y="360" width="184" height="48" fill="#ff4400" opacity="0.7" rx="10"/>
    <rect x="430" y="370" width="164" height="28" fill="#ff8833" opacity="0.85"/>
    <!-- Motion blur effect -->
    <line x1="320" y1="384" x2="420" y2="384" stroke="#ff4400" stroke-width="8" opacity="0.3"/>
  </g>
  
  <!-- Pentagon label -->
  <rect x="30" y="680" width="280" height="60" fill="rgba(0,0,0,0.7)" stroke="#00ff00" stroke-width="2"/>
  <text x="50" y="710" font-family="monospace" font-size="16" fill="#00ff00">GOFAST VIDEO 2015</text>
  <text x="50" y="728" font-family="monospace" font-size="12" fill="#00ff00">SUPERSONIC UAP</text>
</svg>