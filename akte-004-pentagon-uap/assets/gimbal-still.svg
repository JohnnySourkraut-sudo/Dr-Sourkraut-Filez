<svg viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg">
  <!-- FLIR thermal background -->
  <defs>
    <radialGradient id="thermalGrad" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000033;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="768" fill="url(#thermalGrad)"/>
  
  <!-- Grid overlay -->
  <g stroke="rgba(0,255,0,0.2)" stroke-width="2">
    <line x1="0" y1="384" x2="1024" y2="384"/>
    <line x1="512" y1="0" x2="512" y2="768"/>
    <circle cx="512" cy="384" r="200" fill="none"/>
  </g>
  
  <!-- GIMBAL Object -->
  <ellipse cx="512" cy="300" rx="120" ry="60" fill="#ffff00" opacity="0.8"/>
  <ellipse cx="512" cy="300" rx="100" ry="50" fill="#ffff88" opacity="0.9"/>
  
  <!-- Pentagon stamp -->
  <rect x="30" y="680" width="280" height="60" fill="rgba(0,0,0,0.7)" stroke="#00ff00" stroke-width="2"/>
  <text x="50" y="710" font-family="monospace" font-size="16" fill="#00ff00">GIMBAL INCIDENT 2015</text>
  <text x="50" y="728" font-family="monospace" font-size="12" fill="#00ff00">OFFICIAL DECLASSIFIED</text>
</svg>